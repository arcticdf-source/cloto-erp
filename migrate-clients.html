<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Импорт клиентов из отгрузок</title>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #f5f6fa; margin: 0; padding: 40px 24px; color: #222; }
    .card { background: #fff; border-radius: 12px; padding: 32px; max-width: 820px; margin: 0 auto; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 6px; }
    p.sub { color: #666; margin: 0 0 28px; font-size: 14px; }
    .client-block { margin-bottom: 18px; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
    .client-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f9fafb; font-weight: 600; font-size: 14px; }
    .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; background: #e8f5e9; color: #2e7d32; }
    .badge.exists { background: #fff3e0; color: #e65100; }
    .products { padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: #e3f2fd; color: #1565c0; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; transition: background .15s; }
    .btn-primary { background: #1abc9c; color: #fff; }
    .btn-primary:hover { background: #17a589; }
    .btn-secondary { background: #f0f0f0; color: #444; margin-left: 10px; }
    .btn-secondary:hover { background: #e0e0e0; }
    .actions { margin-top: 28px; display: flex; align-items: center; }
    .result { margin-top: 20px; padding: 14px 18px; border-radius: 8px; font-size: 14px; display: none; }
    .result.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; display: block; }
    .result.error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; display: block; }
    .summary { font-size: 13px; color: #555; margin-top: 6px; }
    .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #999; margin-bottom: 12px; }
  </style>
</head>
<body>
<script>
  window.__sharedStateConfig = {
    keys: [
      'cloto_client_cards_v2',
      'cloto_companies_list_v1',
      'cloto_deleted_companies_v1'
    ]
  };
</script>
<script src="shared-state-sync.js"></script>
<div class="card">
  <h1>Импорт клиентов из отгрузок</h1>
  <p class="sub">Ниже — все клиенты из таблицы отгрузок. Нажмите «Импортировать», чтобы добавить их в CRM и заполнить продукты клиентов.</p>

  <div class="section-label">Клиенты и продукты (из shipments-live.html)</div>
  <div id="preview"></div>

  <div class="actions">
    <button class="btn btn-primary" onclick="runImport()">Импортировать всё</button>
    <button class="btn btn-secondary" onclick="location.href='companies.html'">Отмена</button>
  </div>
  <div id="result" class="result"></div>
</div>

<script>
  var CLIENT_STORAGE_KEY = 'cloto_client_cards_v2';
  var COMPANIES_LIST_KEY = 'cloto_companies_list_v1';

  // Client → products mapping extracted from orders_data.js (shipments table source)
  var IMPORT_DATA = {
    "ОМАС": ["Сульф асф", "ТЕРРАПАН", "СУПЕРСЛАЙДЕР ГОЛД"],
    "Инко-Сервис": ["ЭКСТРАМУЛ-2000", "Сульф асф", "IN-MOD (РЕОМОД)", "ВЕЛЛТРИТ", "Стабилайт II"],
    "КазПетроДриллинг": ["Оптитрол Ж"],
    "ССК": ["Стабилайт II"],
    "Сургутнефтегаз": ["BLACKTROL ж", "Оптитрол Ж"],
    "МАДСЕРВИС": ["ПОЛИТРОЛ", "ДЖИ-ДРИЛЛ", "ПОЛИКАП", "Сульф асф", "ТЕРМАВИС РУО", "РЕОМОД ж", "СТАБИЛАЙТ РУО", "ЭКСТРАМУЛ-2000", "BLACKTROL ж", "ПОЛИКАП ж"],
    "Буринтех": ["СУЛЬФОБИТ"],
    "FWL": ["ЭКСТРАМУЛ-2000", "ЛИКВИТРОЛ", "ВЕЛЛТРИТ"],
    "ТКШ": ["АДВАНТА п"],
    "Прогресс-2": ["BLACKTROL ж"],
    "БГРП": ["СУПЕРСЛАЙДЕР ПЛАТИНУМ"],
    "Энергоресурс": ["BLACKTROL ж"],
    "Акрос": ["Drilling Lube (СС РУО)"],
    "КОМОКС": ["РЕОМОД п"],
    "БурСервис": ["DRIL-N-SLIDE (СС Платинум)", "EZ BUR DP (Поликап)", "BURFLC", "BUR MUL NTR (Экстрамул Суприм)", "BUR TRIM II PLUS (СС Голд)"],
    "Комар эпокси": ["СУПЕРСЛАЙДЕР ГОЛД", "КЛСП", "КАРБО-БЛОК Fine", "КАРБО-БЛОК Medium", "КАРБО-БЛОК Coarse", "Оптитрол п"],
    "НГС": ["АПП-490", "КАТФЛО", "ФОРЕСТ-ОЙЛ"],
    "Полихимпром": ["Сульф асф", "СУПЕРСЛАЙДЕР СИЛЬВЕР"],
    "Петроинжиниринг": ["Petro ASF", "СУПЕРСЛАЙДЕР ПЛАТИНУМ"],
    "СГК ГРУПП": ["СУПЕРСЛАЙДЕР СИЛЬВЕР", "СУПЕРСЛАЙДЕР ПЛАТИНУМ", "BLACKTROL ж", "Оптитрол Ж"],
    "Химнефтесервис": ["ПОЛИТРОЛ"],
    "МК Сервис": ["Реагент В"]
  };

  function readStorage(key) {
    try { return JSON.parse(localStorage.getItem(key) || (key === COMPANIES_LIST_KEY ? '[]' : '{}')); } catch(e) { return key === COMPANIES_LIST_KEY ? [] : {}; }
  }

  function normName(v) {
    return String(v || '').toLowerCase().replace(/ё/g, 'е').replace(/\s+/g, ' ').trim();
  }

  function hashKey(value) {
    var text = String(value || '');
    var hash = 0;
    for (var i = 0; i < text.length; i++) { hash = ((hash << 5) - hash) + text.charCodeAt(i); hash |= 0; }
    return Math.abs(hash).toString(36).toUpperCase();
  }

  function productId() { return 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }

  function buildSku(companyName, pid) {
    function tok(v, fb) { var c = String(v||'').toUpperCase().replace(/[^A-Z0-9]+/g,''); return (c||String(fb||'').toUpperCase().replace(/[^A-Z0-9]+/g,'')||'ITEM').slice(0,8); }
    return 'CPL-' + tok(hashKey(companyName),'CL') + '-' + tok(hashKey(pid),'ITEM');
  }

  function renderPreview() {
    var companiesList = readStorage(COMPANIES_LIST_KEY);
    var clientCards = readStorage(CLIENT_STORAGE_KEY);
    var existingNorms = companiesList.map(normName);
    var html = '';
    Object.keys(IMPORT_DATA).forEach(function(client) {
      var exists = existingNorms.indexOf(normName(client)) !== -1;
      // also check client cards keys
      if (!exists) {
        var cardKeys = Object.keys(clientCards).map(normName);
        if (cardKeys.indexOf(normName(client)) !== -1) exists = true;
      }
      var products = IMPORT_DATA[client];
      html += '<div class="client-block">';
      html += '<div class="client-header"><span>' + client + '</span><span class="badge' + (exists ? ' exists' : '') + '">' + (exists ? 'уже есть' : 'новый') + '</span></div>';
      html += '<div class="products">';
      products.forEach(function(p) { html += '<span class="tag">' + p + '</span>'; });
      html += '</div></div>';
    });
    document.getElementById('preview').innerHTML = html;
  }

  function runImport() {
    try {
      var companiesList = readStorage(COMPANIES_LIST_KEY);
      var clientCards = readStorage(CLIENT_STORAGE_KEY);
      var addedClients = 0, updatedProducts = 0;

      Object.keys(IMPORT_DATA).forEach(function(client) {
        var clientNorm = normName(client);

        // Add to companies list if not present
        var inList = companiesList.some(function(n) { return normName(n) === clientNorm; });
        if (!inList) {
          companiesList.push(client);
          addedClients++;
        }

        // Find exact key in client cards (case-insensitive)
        var cardKey = null;
        Object.keys(clientCards).forEach(function(k) {
          if (normName(k) === clientNorm) cardKey = k;
        });

        // Create card entry if missing
        if (!cardKey) {
          cardKey = client;
          clientCards[cardKey] = { turnover: '', statusText: '', potential: '', info: '', address: '', events: [], contacts: [], products: [], logoData: '' };
        }

        var card = clientCards[cardKey];
        if (!Array.isArray(card.products)) card.products = [];

        var existingProductNames = card.products.map(function(p) { return normName(p.name); });

        IMPORT_DATA[client].forEach(function(productName) {
          if (existingProductNames.indexOf(normName(productName)) === -1) {
            var pid = productId();
            card.products.push({
              id: pid,
              sku: buildSku(cardKey, pid),
              name: productName,
              recipe: '',
              notes: '',
              exwPrice: '',
              packType: 'bags',
              unitWeightKg: '25',
              palletUnits: '40',
              truckUnits: '800',
              containerUnits: '1000',
              includedInQuote: false
            });
            updatedProducts++;
            existingProductNames.push(normName(productName));
          }
        });
      });

      localStorage.setItem(COMPANIES_LIST_KEY, JSON.stringify(companiesList));
      localStorage.setItem(CLIENT_STORAGE_KEY, JSON.stringify(clientCards));

      var resultEl = document.getElementById('result');
      resultEl.className = 'result success';
      resultEl.innerHTML = '✓ Импорт выполнен успешно! Добавлено клиентов: <strong>' + addedClients + '</strong>, продуктов: <strong>' + updatedProducts + '</strong>.<br><br>' +
        '<a href="companies.html" style="color:#1a7a5a;font-weight:600">Перейти к списку клиентов →</a>';
      renderPreview();
    } catch(e) {
      var resultEl = document.getElementById('result');
      resultEl.className = 'result error';
      resultEl.textContent = 'Ошибка при импорте: ' + e.message;
    }
  }

  renderPreview();
</script>
</body>
</html>

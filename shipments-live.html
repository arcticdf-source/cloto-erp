<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отгрузки продукции 2026 — Клото</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #edf0e6;
      --panel: #f7f8f1;
      --grid: #9ea58d;
      --grid-strong: #6f7861;
      --text: #1d2418;
      --muted: #5a6450;
      --tab: #f7f8f1;
      --tab-active: #ece24d;
      --shadow: rgba(53, 66, 38, 0.12);
    }
    body {
      margin: 0;
      background: linear-gradient(180deg, #f1f4ea 0%, #dde4d2 100%);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }
    .page {
      width: min(1880px, calc(100vw - 18px));
      margin: 8px auto;
      padding: 6px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .titlebar {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border: 1px solid var(--grid-strong);
      background: linear-gradient(180deg, #fafbf5 0%, #edf2df 100%);
    }
    .titlebar strong {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 19px;
      letter-spacing: -0.02em;
    }
    .month-badge {
      min-height: 100%;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border-left: 1px solid var(--grid-strong);
      background: #ece24d;
      font-size: 13px;
      font-weight: 700;
    }
    .btn {
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--grid-strong);
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      font: inherit;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: #eef3e2; }
    .save-state {
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--grid-strong);
      background: #edf2df;
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }
    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .tab {
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid var(--grid-strong);
      background: var(--tab);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .tab.active { background: var(--tab-active); }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .summary-card {
      min-height: 48px;
      padding: 8px 10px;
      border: 1px solid var(--grid-strong);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .summary-card span {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .summary-card strong {
      font-size: 18px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .sheet-wrap {
      border: 1px solid var(--grid-strong);
      background: var(--panel);
      box-shadow: 0 12px 28px var(--shadow);
      overflow: auto;
    }
    .bottom-scroll {
      position: sticky;
      bottom: 0;
      margin-top: 6px;
      border: 1px solid var(--grid-strong);
      background: #eef2e5;
      overflow-x: auto;
      overflow-y: hidden;
      height: 18px;
      box-shadow: 0 6px 12px rgba(53, 66, 38, 0.08);
      z-index: 3;
    }
    .bottom-scroll[hidden] {
      display: none;
    }
    .bottom-scroll-inner {
      height: 1px;
    }
    .sheet-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .sheet-table td,
    .sheet-table th {
      border: 1px solid var(--grid);
      padding: 4px 6px;
      font-size: 11px;
      line-height: 1.18;
      vertical-align: middle;
      color: var(--text);
      overflow-wrap: anywhere;
    }
    .sheet-table td.cell-center,
    .sheet-table th.cell-center { text-align: center; }
    .sheet-table td.cell-right,
    .sheet-table th.cell-right { text-align: right; }
    .sheet-table td.cell-left,
    .sheet-table th.cell-left { text-align: left; }
    .sheet-table td.cell-bold,
    .sheet-table th.cell-bold { font-weight: 700; }
    .sheet-table tr.sheet-generated td {
      background: #eef7d6;
    }
    .sheet-table tr.sheet-generated:hover td {
      background: #e4f0c2;
    }
    .sheet-table td[contenteditable="true"] {
      cursor: text;
    }
    .sheet-table td[contenteditable="true"]:focus {
      outline: 2px solid #c8b900;
      outline-offset: -2px;
      background: #fff8a6 !important;
    }
    .empty {
      padding: 24px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 1180px) {
      .toolbar { grid-template-columns: 1fr 1fr 1fr; }
      .titlebar { grid-column: 1 / -1; }
    }
    @media (max-width: 820px) {
      .page { width: calc(100vw - 10px); margin: 5px auto; }
      .toolbar { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="toolbar">
      <div class="titlebar">
        <strong>Отгрузки продукции</strong>
        <div class="month-badge" id="month-badge">Март 2026</div>
      </div>
      <a class="btn" href="sales-orders.html">Заказы</a>
      <a class="btn" href="sales-shipped-orders.html">Отгруженные</a>
      <button class="btn" type="button" onclick="saveActiveSheet()">Сохранить</button>
      <button class="btn" type="button" onclick="refreshActiveSheet()">Обновить</button>
      <div class="save-state" id="save-state">Не сохранено</div>
    </section>

    <section class="tabs">
      <button class="tab" type="button" data-key="Янв" onclick="selectSheet('Янв')">Январь 2026</button>
      <button class="tab" type="button" data-key="Фев" onclick="selectSheet('Фев')">Февраль 2026</button>
      <button class="tab active" type="button" data-key="Мар" onclick="selectSheet('Мар')">Март 2026</button>
      <button class="tab" type="button" data-key="Апр" onclick="selectSheet('Апр')">Апрель 2026</button>
    </section>

    <section class="summary">
      <article class="summary-card"><span>Уникальных заказов</span><strong id="orders-count">0</strong></article>
      <article class="summary-card"><span>Строк отгрузки</span><strong id="rows-count">0</strong></article>
      <article class="summary-card"><span>Дата листа</span><strong id="today-count">—</strong></article>
      <article class="summary-card"><span>Итог по листу</span><strong id="amount-total">0 ₽</strong></article>
    </section>

    <section class="sheet-wrap" id="sheet-wrap">
      <div id="sheet-container"></div>
    </section>
    <div class="bottom-scroll" id="bottom-scroll" hidden>
      <div class="bottom-scroll-inner" id="bottom-scroll-inner"></div>
    </div>
  </div>

  <script src="shipments-workbook-data.js"></script>
  <script>
    var currentSheetKey = 'Мар';
    var MONTH_NAMES = { 'Янв': 'Январь 2026', 'Фев': 'Февраль 2026', 'Мар': 'Март 2026', 'Апр': 'Апрель 2026' };
    var STORAGE_KEY = 'cloto_shipments_workbook_edits_v1';
    var SHIPPED_ORDERS_KEY = 'cloto_sales_orders_shipped';
    var workbookState = loadWorkbookState();
    var isSyncingScroll = false;
    var syncChannel = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('cloto-orders-sync') : null;

    function safeStr(value) {
      return String(value == null ? '' : value);
    }

    function escapeHtml(value) {
      return safeStr(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function monthKeyFromTitle(title) {
      var lower = safeStr(title).toLowerCase();
      if (lower.indexOf('январ') === 0) return 'Янв';
      if (lower.indexOf('феврал') === 0) return 'Фев';
      if (lower.indexOf('март') === 0) return 'Мар';
      if (lower.indexOf('апрел') === 0) return 'Апр';
      return '';
    }

    function cloneData(value) {
      return JSON.parse(JSON.stringify(value || {}));
    }

    function loadWorkbookState() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          var parsed = JSON.parse(saved);
          if (parsed && Array.isArray(parsed.sheets)) return parsed;
        }
      } catch (error) {
        console.warn('Не удалось загрузить сохраненные правки отгрузок.', error);
      }
      return cloneData(window.SHIPMENTS_WORKBOOK || { sheets: [] });
    }

    function readStorageArray(key) {
      try {
        var parsed = JSON.parse(localStorage.getItem(key) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function getWorkbookSheets() {
      return workbookState && Array.isArray(workbookState.sheets)
        ? workbookState.sheets
        : [];
    }

    function getSheetByKey(key) {
      return getWorkbookSheets().find(function(sheet) {
        return monthKeyFromTitle(sheet.title) === key;
      }) || null;
    }

    function monthKeyFromDate(value) {
      if (!value) return currentSheetKey;
      var text = safeStr(value);
      if (/^\d{4}-\d{2}-\d{2}/.test(text)) {
        var month = Number(text.slice(5, 7));
        if (month === 1) return 'Янв';
        if (month === 2) return 'Фев';
        if (month === 3) return 'Мар';
        if (month === 4) return 'Апр';
      }
      if (/^\d{2}\.\d{2}\.\d{4}$/.test(text)) {
        var monthFromRu = Number(text.slice(3, 5));
        if (monthFromRu === 1) return 'Янв';
        if (monthFromRu === 2) return 'Фев';
        if (monthFromRu === 3) return 'Мар';
        if (monthFromRu === 4) return 'Апр';
      }
      return currentSheetKey;
    }

    function formatShipmentDate(value) {
      var text = safeStr(value);
      if (/^\d{4}-\d{2}-\d{2}T/.test(text)) text = text.slice(0, 10);
      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) {
        return text.slice(8, 10) + '.' + text.slice(5, 7) + '.' + text.slice(0, 4);
      }
      return text || '—';
    }

    function makeCell(value, align) {
      return {
        value: safeStr(value),
        bg: '',
        bold: false,
        align: align || 'center',
        rowspan: 1,
        colspan: 1
      };
    }

    function getOrderLines(order) {
      return Array.isArray(order && order.lines) ? order.lines : [];
    }

    function getShipmentRowKey(order, line, lineIndex) {
      return [safeStr(order && order.number), safeStr(line && line.id), String(lineIndex), safeStr(order && order.shippedAt)].join('|');
    }

    function getShipmentLabel(order, line) {
      var details = order && order.shipmentDetails || null;
      if (details && details.mode === 'pickup') return 'Самовывоз';
      if (details && details.driver) return 'авто(' + details.driver + ')';
      if (line && line.module === 'container') return 'контейнер';
      return 'авто';
    }

    function getShipmentDestination(order, line) {
      var details = order && order.shipmentDetails || null;
      if (details && details.mode === 'delivery' && details.destination) return details.destination;
      if (line && line.deliveryType === 'pickup') return 'Самовывоз';
      return line && line.destination ? line.destination : 'Архангельск';
    }

    function makeShipmentRowFromOrder(order, line, lineIndex) {
      var shippedAt = order && order.shippedAt ? order.shippedAt : (line && line.deliveryDate) || '';
      var tons = Number(line && line.tons || 0);
      var units = Number(line && line.units || 0);
      var priceWithoutVat = Number(line && line.priceWithoutVat || 0);
      var amountWithoutVat = Number(line && line.amountWithoutVat || 0);
      var driver = order && order.shipmentDetails && order.shipmentDetails.driver || '';
      var vehicleNumber = order && order.shipmentDetails && order.shipmentDetails.vehicleNumber || '';
      var driverPhone = order && order.shipmentDetails && order.shipmentDetails.driverPhone || '';

      return {
        __shipmentKey: getShipmentRowKey(order, line, lineIndex),
        __generatedFromShipment: true,
        height: 13.5,
        cells: [
          makeCell(getShipmentLabel(order, line), 'center'),
          makeCell(order && order.number || '', 'center'),
          makeCell(order && order.buyer && order.buyer.name || '', 'center'),
          makeCell(line && line.productName || '', 'center'),
          makeCell(line && line.batch || 'б/п', 'center'),
          makeCell(Math.round(tons * 1000), 'center'),
          makeCell(units ? Math.round(units) : '', 'center'),
          makeCell(getShipmentDestination(order, line), 'center'),
          makeCell('отгружено', 'center'),
          makeCell(formatShipmentDate(shippedAt), 'center'),
          makeCell(vehicleNumber, 'center'),
          makeCell(driverPhone, 'center'),
          makeCell(driver, 'center'),
          makeCell('', 'center'),
          makeCell(Math.round(tons * 1000), 'center'),
          makeCell('', 'center'),
          makeCell('', 'center'),
          makeCell('+', 'center'),
          makeCell(priceWithoutVat ? Math.round(priceWithoutVat) : '', 'right'),
          makeCell(amountWithoutVat ? Math.round(amountWithoutVat) : '', 'right')
        ]
      };
    }

    function findSheetInsertIndex(sheet) {
      var summaryIndex = (sheet.rows || []).findIndex(function(row, rowIndex) {
        return rowIndex >= 4 && isSummaryRow(expandRow(row));
      });
      return summaryIndex >= 0 ? summaryIndex : (sheet.rows || []).length;
    }

    function syncWorkbookWithShippedOrders() {
      var shippedOrders = readStorageArray(SHIPPED_ORDERS_KEY);
      var changed = false;

      shippedOrders.forEach(function(order) {
        getOrderLines(order).forEach(function(line, lineIndex) {
          var monthKey = monthKeyFromDate(order && order.shippedAt ? order.shippedAt : line && line.deliveryDate);
          var sheet = getSheetByKey(monthKey) || getSheetByKey(currentSheetKey) || getWorkbookSheets()[0];
          if (!sheet) return;

          var shipmentKey = getShipmentRowKey(order, line, lineIndex);
          var exists = (sheet.rows || []).some(function(row) {
            return row && row.__shipmentKey === shipmentKey;
          });

          if (exists) return;

          sheet.rows.splice(findSheetInsertIndex(sheet), 0, makeShipmentRowFromOrder(order, line, lineIndex));
          changed = true;
        });
      });

      if (changed) {
        persistWorkbookState();
        setSaveState('Синхронизировано');
      }
    }

    function expandRow(row) {
      var values = [];
      (row.cells || []).forEach(function(cell) {
        var span = Math.max(1, Number(cell.colspan || 1));
        for (var index = 0; index < span; index += 1) {
          values.push(cell.value || '');
        }
      });
      return values;
    }

    function parseRub(value) {
      var text = safeStr(value).replace(/[^\d,.-]/g, '').replace(',', '.');
      var parsed = Number(text || 0);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function isSummaryRow(expanded) {
      var first = safeStr(expanded[0] || '').toLowerCase();
      var second = safeStr(expanded[1] || '').toLowerCase();
      return first.indexOf('итого') === 0 || first.indexOf('из них') === 0 || first.indexOf('осталось') === 0 || second.indexOf('итого') === 0;
    }

    function getDataRows(sheet) {
      return (sheet.rows || []).map(function(row, rowIndex) {
        return { row: row, rowIndex: rowIndex, expanded: expandRow(row) };
      }).filter(function(item) {
        var values = item.expanded;
        return item.rowIndex >= 4 && values[1] && values[3] && values[9] && !isSummaryRow(values);
      });
    }

    function getSheetDate(sheet) {
      var firstRow = sheet && sheet.rows && sheet.rows[0] ? expandRow(sheet.rows[0]) : [];
      return firstRow[2] || '—';
    }

    function updateTabs() {
      document.querySelectorAll('.tab').forEach(function(tab) {
        tab.classList.toggle('active', tab.getAttribute('data-key') === currentSheetKey);
      });
    }

    function updateSummary(sheet) {
      var dataRows = getDataRows(sheet);
      var uniqueOrders = {};
      var total = 0;

      dataRows.forEach(function(item) {
        uniqueOrders[safeStr(item.expanded[1])] = true;
        total += parseRub(item.expanded[19]);
      });

      document.getElementById('month-badge').textContent = MONTH_NAMES[currentSheetKey] || safeStr(sheet.title || 'Лист');
      document.getElementById('orders-count').textContent = String(Object.keys(uniqueOrders).length);
      document.getElementById('rows-count').textContent = String(dataRows.length);
      document.getElementById('today-count').textContent = safeStr(getSheetDate(sheet) || '—');
      document.getElementById('amount-total').textContent = total.toLocaleString('ru-RU', { maximumFractionDigits: 0 }) + ' ₽';
    }

    function alignmentClass(align) {
      if (align === 'center') return 'cell-center';
      if (align === 'right') return 'cell-right';
      return 'cell-left';
    }

    function setSaveState(text) {
      var state = document.getElementById('save-state');
      if (state) state.textContent = text;
    }

    function captureCurrentTableEdits() {
      var sheet = getSheetByKey(currentSheetKey);
      var table = document.querySelector('#sheet-container .sheet-table');
      if (!sheet || !table) return;

      Array.prototype.forEach.call(table.rows, function(rowElement, rowIndex) {
        var rowData = sheet.rows && sheet.rows[rowIndex];
        if (!rowData || !Array.isArray(rowData.cells)) return;

        Array.prototype.forEach.call(rowElement.cells, function(cellElement, cellIndex) {
          var cellData = rowData.cells[cellIndex];
          if (!cellData) return;
          cellData.value = cellElement.innerText.replace(/\r/g, '').replace(/\u00a0/g, ' ');
        });
      });
    }

    function persistWorkbookState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(workbookState));
    }

    function markSheetDirty() {
      setSaveState('Не сохранено');
    }

    function setupEditableTracking() {
      var container = document.getElementById('sheet-container');
      if (!container || container.dataset.editTrackingReady === '1') return;

      container.dataset.editTrackingReady = '1';
      container.addEventListener('input', function(event) {
        if (event.target && event.target.matches('td[contenteditable="true"]')) {
          markSheetDirty();
        }
      });
    }

    function saveActiveSheet() {
      try {
        captureCurrentTableEdits();
        persistWorkbookState();
        renderActiveSheet();
        setSaveState('Сохранено');
      } catch (error) {
        console.error(error);
        setSaveState('Ошибка сохранения');
      }
    }

    function refreshActiveSheet() {
      captureCurrentTableEdits();
      renderActiveSheet();
    }

    function setupScrollSync() {
      var wrap = document.getElementById('sheet-wrap');
      var bottom = document.getElementById('bottom-scroll');
      if (!wrap || !bottom || wrap.dataset.scrollSyncReady === '1') return;

      wrap.dataset.scrollSyncReady = '1';

      wrap.addEventListener('scroll', function() {
        if (isSyncingScroll) return;
        isSyncingScroll = true;
        bottom.scrollLeft = wrap.scrollLeft;
        isSyncingScroll = false;
      });

      bottom.addEventListener('scroll', function() {
        if (isSyncingScroll) return;
        isSyncingScroll = true;
        wrap.scrollLeft = bottom.scrollLeft;
        isSyncingScroll = false;
      });

      window.addEventListener('resize', syncBottomScroll);
    }

    function syncBottomScroll() {
      var wrap = document.getElementById('sheet-wrap');
      var bottom = document.getElementById('bottom-scroll');
      var inner = document.getElementById('bottom-scroll-inner');
      var table = document.querySelector('#sheet-container .sheet-table');
      if (!wrap || !bottom || !inner) return;

      var contentWidth = table ? table.scrollWidth : 0;
      inner.style.width = Math.max(contentWidth, wrap.clientWidth) + 'px';
      bottom.hidden = !(contentWidth > wrap.clientWidth + 2);
      bottom.scrollLeft = wrap.scrollLeft;
    }

    function buildTableHtml(sheet) {
      if (!sheet) {
        return '<div class="empty">Лист не найден.</div>';
      }

      var html = '<table class="sheet-table">';
      html += '<colgroup>';
      (sheet.colWidths || []).forEach(function(width) {
        html += '<col style="width:' + Number(width || 80) + 'px">';
      });
      html += '</colgroup>';

      (sheet.rows || []).forEach(function(row, rowIndex) {
        var expanded = expandRow(row);
        var rowStyle = row.height ? ' style="height:' + Number(row.height) + 'pt"' : '';
        var rowClass = row && row.__generatedFromShipment ? ' class="sheet-generated"' : '';
        html += '<tr' + rowClass + rowStyle + '>';

        (row.cells || []).forEach(function(cell) {
          var styles = [];
          if (cell.bg) styles.push('background:' + cell.bg);
          var classes = [alignmentClass(cell.align || '')];
          if (cell.bold) classes.push('cell-bold');
          html += '<td' +
            (cell.rowspan > 1 ? ' rowspan="' + Number(cell.rowspan) + '"' : '') +
            (cell.colspan > 1 ? ' colspan="' + Number(cell.colspan) + '"' : '') +
            ' contenteditable="true" spellcheck="false"' +
            (classes.length ? ' class="' + classes.join(' ') + '"' : '') +
            (styles.length ? ' style="' + styles.join(';') + '"' : '') +
            '>' + escapeHtml(cell.value).replace(/\n/g, '<br>') + '</td>';
        });

        html += '</tr>';
      });

      html += '</table>';
      return html;
    }

    function renderActiveSheet() {
      syncWorkbookWithShippedOrders();
      var sheet = getSheetByKey(currentSheetKey);
      updateTabs();
      updateSummary(sheet || { rows: [], title: '' });
      document.getElementById('sheet-container').innerHTML = buildTableHtml(sheet);
      syncBottomScroll();
    }

    function selectSheet(key) {
      captureCurrentTableEdits();
      currentSheetKey = key;
      setSaveState('Не сохранено');
      renderActiveSheet();
    }

    function handleExternalShipmentSync(preferredSheetKey) {
      if (preferredSheetKey && getSheetByKey(preferredSheetKey)) {
        currentSheetKey = preferredSheetKey;
      }
      syncWorkbookWithShippedOrders();
      renderActiveSheet();
    }

    setupScrollSync();
    setupEditableTracking();
    window.addEventListener('storage', function(event) {
      if (!event || event.key === SHIPPED_ORDERS_KEY) handleExternalShipmentSync();
    });
    if (syncChannel) {
      syncChannel.onmessage = function(message) {
        if (message && message.data && message.data.type === 'shipment-updated') {
          handleExternalShipmentSync(message.data.sheetKey || '');
        }
      };
    }
    renderActiveSheet();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЛХЦ — Анимация цеха — Клото</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #eef4fb; --bg2: #e3edf8;
      --surface: rgba(255,255,255,0.88);
      --border: rgba(100,140,190,0.22);
      --text: #1e2c3c; --muted: #6a7f99;
      --blue: #3b91da; --cyan: #24b7ad; --gold: #d9a83a;
      --radius: 20px; --shadow: 0 14px 30px rgba(30,60,100,0.13);
    }
    body {
      min-height: 100vh; font-family: 'Inter', sans-serif; color: var(--text);
      background: radial-gradient(circle at top right, rgba(59,145,218,0.13), transparent 28%),
        radial-gradient(circle at bottom left, rgba(36,183,173,0.11), transparent 32%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(59,145,218,0.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(59,145,218,0.04) 1px,transparent 1px);
      background-size: 48px 48px;
    }
    .wrap { position: relative; z-index: 1; max-width: 1560px; margin: 0 auto; padding: 24px 20px 40px; }

    .page-top {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      justify-content: space-between; margin-bottom: 18px;
    }
    .page-title-group { display: flex; flex-direction: column; gap: 4px; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px; border-radius: 999px;
      border: 1px solid rgba(59,145,218,0.28); color: var(--blue);
      font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em;
    }
    .page-title { font-family: 'Space Grotesk',sans-serif; font-size: clamp(26px,3.5vw,40px); font-weight: 800; letter-spacing: -0.03em; }
    .page-title span { color: var(--blue); }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); text-decoration: none;
      font-size: 13px; font-weight: 700; box-shadow: var(--shadow);
    }

    /* STATUS BAR */
    .status-bar {
      display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
    }
    .status-chip {
      display: flex; align-items: center; gap: 9px;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface); padding: 8px 14px;
      box-shadow: 0 4px 12px rgba(30,60,100,0.08);
    }
    .chip-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    .chip-dot.green { background: #22cc66; box-shadow: 0 0 6px #22cc66; }
    .chip-dot.amber { background: #f0b830; box-shadow: 0 0 6px #f0b830; }
    .chip-dot.blue  { background: #3b91da; box-shadow: 0 0 6px #3b91da; }
    .chip-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .chip-val { font-family: 'Space Grotesk',sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
    .chip-unit { font-size: 10px; color: var(--muted); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* PLANT PANEL */
    .plant-panel {
      border: 1px solid var(--border); border-radius: var(--radius);
      background: #09182a; box-shadow: 0 20px 50px rgba(5,15,35,0.45);
      overflow: hidden; padding: 0;
    }
    .plant-svg {
      width: 100%; height: auto; display: block;
    }

    /* LEGEND */
    .legend {
      margin-top: 14px; display: flex; flex-wrap: wrap; gap: 10px 20px;
      align-items: center;
      border: 1px solid var(--border); border-radius: 14px;
      background: var(--surface); padding: 12px 18px;
      box-shadow: 0 4px 16px rgba(30,60,100,0.08);
    }
    .legend-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
    .leg-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text); }
    .leg-line { width: 32px; height: 4px; border-radius: 2px; }

    /* ─── SVG ANIMATION KEYFRAMES ─── */
    @keyframes spinCW  { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
    @keyframes spinCCW { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }
    @keyframes waveSlide { from { transform: translateX(0); } to { transform: translateX(60px); } }
    @keyframes flowFwd { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
    @keyframes flowRev { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 20; } }
    @keyframes bagMove { from { transform: translateX(0); } to { transform: translateX(582px); } }
    @keyframes drumSpin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes glow { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes statusBlink { 0%,100%{opacity:1} 45%,55%{opacity:0.3} }

    /* Stirrers */
    .st-r1 { transform-origin: 0 0; animation: spinCW  3.4s linear infinite; }
    .st-r2 { transform-origin: 0 0; animation: spinCCW 4.1s linear infinite; }
    .st-r3 { transform-origin: 0 0; animation: spinCW  3.8s linear infinite; }
    .st-k1 { transform-origin: 0 0; animation: spinCCW 6.0s linear infinite; }

    /* Waves */
    .wv-r1 { animation: waveSlide 2.4s linear infinite; }
    .wv-r2 { animation: waveSlide 2.9s linear infinite 0.3s; }
    .wv-r3 { animation: waveSlide 2.6s linear infinite 1.1s; }
    .wv-k1 { animation: waveSlide 3.8s linear infinite 0.7s; }
    .wv-n1 { animation: waveSlide 5.0s linear infinite; }
    .wv-n2 { animation: waveSlide 4.5s linear infinite 1.5s; }
    .wv-k15 { animation: waveSlide 3.5s linear infinite 0.5s; }
    .wv-k13 { animation: waveSlide 3.2s linear infinite 1.8s; }

    /* Pipes */
    .pp { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .pp-product { stroke: #c08010; stroke-width: 6; }
    .pp-naoh    { stroke: #1455cc; stroke-width: 5; }
    .pp-steam   { stroke: #dd2200; stroke-width: 4; stroke-dasharray: 9 5; }
    .pp-air     { stroke: #228800; stroke-width: 4; }
    .flow-fwd { stroke-dasharray: 12 8; animation: flowFwd 0.65s linear infinite; }
    .flow-rev { stroke-dasharray: 12 8; animation: flowRev 0.65s linear infinite; }
    .steam-flow { animation: flowFwd 1.1s linear infinite; }

    /* Conveyor bags */
    .bag { animation: bagMove 6.5s linear infinite; }
    .bag:nth-child(2) { animation-delay: -1.625s; }
    .bag:nth-child(3) { animation-delay: -3.25s; }
    .bag:nth-child(4) { animation-delay: -4.875s; }

    /* Conveyor drum */
    .c-drum { transform-box: fill-box; transform-origin: center; animation: drumSpin 1.5s linear infinite; }

    /* Status dot in SVG */
    .svg-status { animation: statusBlink 1.8s ease-in-out infinite; }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="wrap">

  <div class="page-top">
    <div class="page-title-group">
      <div class="eyebrow">🏭 Производство · Клото</div>
      <div class="page-title">ЛХЦ — <span>Линия производства</span></div>
    </div>
    <a class="btn" href="production-dashboard.html">← Производство</a>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-chip">
      <div class="chip-dot green"></div>
      <span class="chip-label">Реактор 1</span>
      <span class="chip-val" id="t-r1">185</span>
      <span class="chip-unit">°C</span>
    </div>
    <div class="status-chip">
      <div class="chip-dot green"></div>
      <span class="chip-label">Реактор 2</span>
      <span class="chip-val" id="t-r2">172</span>
      <span class="chip-unit">°C</span>
    </div>
    <div class="status-chip">
      <div class="chip-dot green"></div>
      <span class="chip-label">Реактор 3</span>
      <span class="chip-val" id="t-r3">168</span>
      <span class="chip-unit">°C</span>
    </div>
    <div class="status-chip">
      <div class="chip-dot amber"></div>
      <span class="chip-label">К-1 уровень</span>
      <span class="chip-val" id="lv-k1">70</span>
      <span class="chip-unit">%</span>
    </div>
    <div class="status-chip">
      <div class="chip-dot blue"></div>
      <span class="chip-label">Выпуск</span>
      <span class="chip-val" id="rate">12.4</span>
      <span class="chip-unit">т/ч</span>
    </div>
    <div class="status-chip">
      <div class="chip-dot green"></div>
      <span class="chip-label">Давление пара</span>
      <span class="chip-val" id="prs">2.4</span>
      <span class="chip-unit">бар</span>
    </div>
    <div class="status-chip">
      <div class="chip-dot green"></div>
      <span class="chip-label">Конвейер</span>
      <span class="chip-val">▶ РАБОТА</span>
    </div>
  </div>

  <!-- PLANT ANIMATION -->
  <div class="plant-panel">
    <svg class="plant-svg" viewBox="0 0 1100 610" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Gradients -->
        <radialGradient id="gv-dark" cx="35%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#1c3a60"/>
          <stop offset="100%" stop-color="#091828"/>
        </radialGradient>
        <radialGradient id="gv-k1" cx="35%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#1a3858"/>
          <stop offset="100%" stop-color="#07141e"/>
        </radialGradient>
        <linearGradient id="gliq-amber" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f5cc20" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#b88000" stop-opacity="0.85"/>
        </linearGradient>
        <linearGradient id="gliq-blue" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4098f0" stop-opacity="0.92"/>
          <stop offset="100%" stop-color="#0d3ea0" stop-opacity="0.85"/>
        </linearGradient>
        <linearGradient id="gliq-cyan" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#30d0d0" stop-opacity="0.90"/>
          <stop offset="100%" stop-color="#0a6888" stop-opacity="0.80"/>
        </linearGradient>
        <linearGradient id="gliq-product" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#e8b800" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#8b6400" stop-opacity="0.88"/>
        </linearGradient>
        <radialGradient id="grad-rim" cx="50%" cy="0%" r="60%">
          <stop offset="0%" stop-color="#3070b0"/>
          <stop offset="100%" stop-color="#0d2040"/>
        </radialGradient>

        <!-- Clip paths -->
        <clipPath id="cr1"><ellipse cx="0" cy="0" rx="79" ry="84"/></clipPath>
        <clipPath id="cr2"><ellipse cx="0" cy="0" rx="67" ry="72"/></clipPath>
        <clipPath id="cr3"><ellipse cx="0" cy="0" rx="67" ry="72"/></clipPath>
        <clipPath id="ck1"><ellipse cx="0" cy="0" rx="114" ry="107"/></clipPath>
        <clipPath id="cn1"><ellipse cx="0" cy="0" rx="54" ry="46"/></clipPath>
        <clipPath id="cn2"><ellipse cx="0" cy="0" rx="47" ry="39"/></clipPath>
        <clipPath id="ck15"><rect x="0" y="0" width="115" height="100" rx="8"/></clipPath>
        <clipPath id="ck13"><rect x="0" y="0" width="105" height="100" rx="8"/></clipPath>
        <clipPath id="cconv"><rect x="0" y="6" width="582" height="28"/></clipPath>

        <!-- Belt stripe pattern (moving) -->
        <pattern id="belt-stripe" x="0" y="0" width="20" height="28" patternUnits="userSpaceOnUse">
          <animateTransform attributeName="patternTransform" type="translate" from="0 0" to="-20 0" dur="0.5s" repeatCount="indefinite"/>
          <line x1="20" y1="0" x2="0" y2="28" stroke="#2a4060" stroke-width="2" opacity="0.5"/>
        </pattern>

        <!-- Glow filter -->
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="5"/>
        </filter>

        <!-- Arrowhead markers -->
        <marker id="arr-product" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
          <polygon points="0 0, 7 3.5, 0 7" fill="#c08010"/>
        </marker>
        <marker id="arr-naoh" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
          <polygon points="0 0, 7 3.5, 0 7" fill="#1455cc"/>
        </marker>
        <marker id="arr-air" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
          <polygon points="0 0, 7 3.5, 0 7" fill="#228800"/>
        </marker>
      </defs>

      <!-- ═══ BACKGROUND ═══ -->
      <rect width="1100" height="610" fill="#09182a"/>

      <!-- Subtle grid -->
      <g opacity="0.07">
        <line x1="0" y1="50" x2="1100" y2="50" stroke="#4080c0" stroke-width="0.5"/>
        <line x1="0" y1="150" x2="1100" y2="150" stroke="#4080c0" stroke-width="0.5"/>
        <line x1="0" y1="250" x2="1100" y2="250" stroke="#4080c0" stroke-width="0.5"/>
        <line x1="0" y1="350" x2="1100" y2="350" stroke="#4080c0" stroke-width="0.5"/>
        <line x1="0" y1="450" x2="1100" y2="450" stroke="#4080c0" stroke-width="0.5"/>
        <line x1="0" y1="550" x2="1100" y2="550" stroke="#4080c0" stroke-width="0.5"/>
        <line x1="100" y1="0" x2="100" y2="610" stroke="#4080c0" stroke-width="0.5"/>
        <line x1="300" y1="0" x2="300" y2="610" stroke="#4080c0" stroke-width="0.5"/>
        <line x1="500" y1="0" x2="500" y2="610" stroke="#4080c0" stroke-width="0.5"/>
        <line x1="700" y1="0" x2="700" y2="610" stroke="#4080c0" stroke-width="0.5"/>
        <line x1="900" y1="0" x2="900" y2="610" stroke="#4080c0" stroke-width="0.5"/>
      </g>

      <!-- Zone dividers + labels -->
      <line x1="232" y1="30" x2="232" y2="590" stroke="#1a3050" stroke-width="1" stroke-dasharray="4 6"/>
      <line x1="795" y1="30" x2="795" y2="590" stroke="#1a3050" stroke-width="1" stroke-dasharray="4 6"/>
      <text x="116" y="22" text-anchor="middle" font-size="10" fill="#1e4a70" font-weight="800" letter-spacing="2" font-family="'Inter',sans-serif">РЕАГЕНТЫ</text>
      <text x="513" y="22" text-anchor="middle" font-size="10" fill="#1e4a70" font-weight="800" letter-spacing="2" font-family="'Inter',sans-serif">ЗОНА РЕАКЦИИ</text>
      <text x="947" y="22" text-anchor="middle" font-size="10" fill="#1e4a70" font-weight="800" letter-spacing="2" font-family="'Inter',sans-serif">ПРОДУКТ</text>

      <!-- ═══════════════════════════════════════════ -->
      <!-- PIPES  (drawn under vessels)                -->
      <!-- ═══════════════════════════════════════════ -->

      <!-- PRODUCT (amber) -->
      <!-- Glow shadow -->
      <path class="pp pp-product" d="M 220,160 L 285,140" stroke="#c08010" stroke-width="12" opacity="0.12"/>
      <path class="pp pp-product" d="M 400,140 L 440,140" stroke="#c08010" stroke-width="12" opacity="0.12"/>
      <path class="pp pp-product" d="M 545,140 L 615,150" stroke="#c08010" stroke-width="12" opacity="0.12"/>
      <path class="pp pp-product" d="M 845,168 L 888,210" stroke="#c08010" stroke-width="12" opacity="0.12"/>
      <path class="pp pp-product" d="M 730,255 L 730,428 L 590,428 L 590,542" stroke="#c08010" stroke-width="12" opacity="0.12"/>
      <path class="pp pp-product" d="M 390,415 L 390,383 L 620,383 L 620,255" stroke="#c08010" stroke-width="12" opacity="0.12"/>
      <path class="pp pp-product" d="M 528,415 L 528,383" stroke="#c08010" stroke-width="12" opacity="0.12"/>
      <!-- Actual animated lines -->
      <path class="pp pp-product flow-fwd" d="M 220,160 L 285,140" marker-end="url(#arr-product)"/>
      <path class="pp pp-product flow-fwd" d="M 400,140 L 440,140" marker-end="url(#arr-product)"/>
      <path class="pp pp-product flow-fwd" d="M 545,140 L 615,150" marker-end="url(#arr-product)"/>
      <path class="pp pp-product flow-fwd" d="M 845,168 L 888,210" marker-end="url(#arr-product)"/>
      <path class="pp pp-product flow-fwd" d="M 730,255 L 730,428 L 590,428 L 590,542"/>
      <path class="pp pp-product flow-rev" d="M 390,415 L 390,383 L 620,383 L 620,255"/>
      <path class="pp pp-product flow-rev" d="M 528,415 L 528,383"/>

      <!-- NaOH (dark blue) -->
      <path class="pp pp-naoh" d="M 90,268 L 90,182 L 56,182 L 56,158" stroke="#1455cc" stroke-width="8" opacity="0.12"/>
      <path class="pp pp-naoh" d="M 145,316 L 248,316 L 248,418" stroke="#1455cc" stroke-width="8" opacity="0.12"/>
      <path class="pp pp-naoh" d="M 138,418 L 322,418 L 322,488 L 460,488" stroke="#1455cc" stroke-width="8" opacity="0.12"/>
      <path class="pp pp-naoh flow-fwd" d="M 90,268 L 90,182 L 56,182 L 56,158" marker-end="url(#arr-naoh)"/>
      <path class="pp pp-naoh flow-fwd" d="M 145,316 L 248,316 L 248,418" marker-end="url(#arr-naoh)"/>
      <path class="pp pp-naoh flow-fwd" d="M 138,418 L 322,418 L 322,488 L 460,488" marker-end="url(#arr-naoh)"/>

      <!-- STEAM (red dashed) -->
      <path class="pp pp-steam steam-flow" d="M 18,78 L 70,78 L 70,76 L 140,76"/>
      <path class="pp pp-steam steam-flow" d="M 342,48 L 342,90"/>
      <path class="pp pp-steam steam-flow" d="M 492,48 L 492,90"/>
      <path class="pp pp-steam steam-flow" d="M 300,575 L 300,488" opacity="0.7"/>
      <path class="pp pp-steam steam-flow" d="M 440,575 L 440,488" opacity="0.7"/>
      <!-- steam source labels -->
      <rect x="0" y="70" width="18" height="16" rx="3" fill="#441408" stroke="#cc2200" stroke-width="1"/>
      <text x="9" y="81" text-anchor="middle" font-size="7" fill="#ff6644" font-weight="700" font-family="'Inter',sans-serif">ПАР</text>

      <!-- AIR (green, from compressor) -->
      <path class="pp pp-air flow-fwd" d="M 258,500 L 322,492" marker-end="url(#arr-air)"/>
      <path class="pp pp-air flow-fwd" d="M 258,502 L 458,506" marker-end="url(#arr-air)"/>

      <!-- ═══════════════════════════════════════════ -->
      <!-- VESSEL: REACTOR 1                           -->
      <!-- ═══════════════════════════════════════════ -->
      <g transform="translate(140, 160)">
        <!-- Glow halo -->
        <ellipse cx="0" cy="0" rx="84" ry="89" fill="#f0c000" opacity="0.06" filter="url(#glow-soft)"/>
        <!-- Vessel body -->
        <ellipse cx="0" cy="0" rx="80" ry="85" fill="url(#gv-dark)" stroke="#1e5090" stroke-width="2.5"/>
        <!-- Liquid (clipped) -->
        <g clip-path="url(#cr1)">
          <rect x="-79" y="-25" width="158" height="110" fill="url(#gliq-amber)"/>
          <g class="wv-r1">
            <path d="M -130,-25 Q -115,-32 -100,-25 Q -85,-18 -70,-25 Q -55,-32 -40,-25 Q -25,-18 -10,-25 Q 5,-32 20,-25 Q 35,-18 50,-25 Q 65,-32 80,-25 Q 95,-18 110,-25 Q 125,-32 140,-25 Q 155,-18 170,-25 L 170,85 L -130,85 Z" fill="#f8d030" opacity="0.9"/>
          </g>
          <!-- Bubbles -->
          <circle cx="-22" cy="0" r="3" fill="#fff8c0" opacity="0.5">
            <animate attributeName="cy" from="82" to="-25" dur="1.7s" repeatCount="indefinite"/>
            <animate attributeName="opacity" from="0.5" to="0" dur="1.7s" repeatCount="indefinite"/>
          </circle>
          <circle cx="10" cy="0" r="2.5" fill="#fff8c0" opacity="0.5">
            <animate attributeName="cy" from="82" to="-25" dur="2.2s" begin="0.6s" repeatCount="indefinite"/>
            <animate attributeName="opacity" from="0.5" to="0" dur="2.2s" begin="0.6s" repeatCount="indefinite"/>
          </circle>
          <circle cx="38" cy="0" r="2" fill="#fff8c0" opacity="0.5">
            <animate attributeName="cy" from="82" to="-25" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" from="0.5" to="0" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
          </circle>
        </g>
        <!-- Top rim (3-D) -->
        <ellipse cx="0" cy="-82" rx="78" ry="10" fill="url(#grad-rim)" stroke="#2060a0" stroke-width="1.5"/>
        <!-- Vessel outline on top -->
        <ellipse cx="0" cy="0" rx="80" ry="85" fill="none" stroke="#2a70c0" stroke-width="2.5"/>
        <!-- Nozzles -->
        <rect x="-4" y="-95" width="8" height="14" rx="3" fill="#1a4070" stroke="#2a70c0" stroke-width="1.2"/>
        <!-- Shaft -->
        <line x1="0" y1="-95" x2="0" y2="-26" stroke="#778899" stroke-width="3" stroke-linecap="round"/>
        <!-- Motor box -->
        <rect x="-14" y="-115" width="28" height="21" rx="5" fill="#162840" stroke="#3060a0" stroke-width="1.5"/>

<script>
  // Animate status chip values with gentle random drift
  function drift(elId, base, amp, decimals, interval) {
    var el = document.getElementById(elId);
    if (!el) return;
    setInterval(function() {
      var v = base + (Math.random() - 0.5) * amp * 2;
      el.textContent = v.toFixed(decimals);
    }, interval + Math.random() * 500);
  }
  drift('t-r1', 185, 1.5, 0, 2200);
  drift('t-r2', 172, 1.2, 0, 2800);
  drift('t-r3', 168, 1.0, 0, 2500);
  drift('lv-k1', 70,  1.0, 0, 3500);
  drift('rate',  12.4, 0.3, 1, 2000);
  drift('prs',   2.4,  0.05, 2, 3000);
</script>

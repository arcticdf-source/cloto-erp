<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Клото — Продукты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #eef4fb;
      --bg2:      #e3edf8;
      --surface:  rgba(255,255,255,0.86);
      --surface2: rgba(255,255,255,0.97);
      --border:   rgba(136,158,186,0.25);
      --border2:  rgba(94,143,199,0.38);
      --accent:   #7c5cfc;
      --accent2:  #b07dff;
      --cyan:     #24b7ad;
      --gold:     #d9a83a;
      --red:      #d96576;
      --green:    #3ea66d;
      --blue:     #3b91da;
      --orange:   #f6ad55;
      --text:     #1e2c3c;
      --muted:    #6f839c;
      --radius:   16px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(124,92,252,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,92,252,.04) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
    .bg-orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(245,200,66,.10) 0%, transparent 70%);
      top: -200px; right: -100px;
      animation: o1 18s ease-in-out infinite;
    }
    .bg-orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,92,252,.12) 0%, transparent 70%);
      bottom: -100px; left: -80px;
      animation: o2 22s ease-in-out infinite;
    }
    @keyframes o1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,70px)} }
    @keyframes o2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(70px,-50px)} }

    /* ── Layout ── */
    .layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* ── Sidebar ── */
    .sidebar {
      width: 250px; min-height: 100vh;
      background: rgba(255,255,255,0.84); backdrop-filter: blur(24px);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 28px 0;
      position: sticky; top: 0; height: 100vh;
      flex-shrink: 0; overflow-y: auto;
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
      padding: 0 22px 28px; border-bottom: 1px solid var(--border);
    }
    .logo-back {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 14px; cursor: pointer;
      transition: all .2s; text-decoration: none; flex-shrink: 0;
    }
    .logo-back:hover { background: rgba(245,200,66,.15); color: var(--gold); border-color: rgba(245,200,66,.3); }
    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 15px;
      background: linear-gradient(135deg, var(--gold), #f6ad55);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 1px; }

    .nav { padding: 16px 10px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .nav-label {
      font-size: 10px; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted); padding: 10px 12px 5px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 13px; border-radius: 10px;
      color: var(--muted); font-size: 13.5px; font-weight: 500;
      cursor: pointer; transition: all .2s; text-decoration: none; position: relative;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active {
      background: rgba(245,200,66,.12); color: var(--gold);
      border: 1px solid rgba(245,200,66,.2);
    }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 25%; bottom: 25%;
      width: 3px; border-radius: 0 3px 3px 0; background: var(--gold);
    }
    .nav-icon { width: 18px; text-align: center; font-size: 15px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 20px;
    }
    .nb-gold   { background: rgba(245,200,66,.2);  color: var(--gold); }
    .nb-red    { background: rgba(255,94,125,.2);   color: var(--red); }
    .nb-green  { background: rgba(72,187,120,.2);   color: var(--green); }

    .sidebar-user {
      margin: 0 10px 4px; padding: 13px;
      border-radius: 12px; background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background .2s;
    }
    .sidebar-user:hover { background: var(--surface2); }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; color: #fff; flex-shrink: 0;
    }
    .user-name { font-size: 12.5px; font-weight: 600; }
    .user-role { font-size: 11px; color: var(--muted); }

    /* ── Main ── */
    .main { flex: 1; padding: 32px 36px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }

    /* ── Topbar ── */
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .page-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700;
      background: linear-gradient(135deg, #2a3d54 30%, var(--blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-sub { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 14px; width: 240px; transition: all .2s;
    }
    .search-box:focus-within { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(245,200,66,.1); }
    .search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; width: 100%; }
    .search-box input::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 18px; border-radius: 10px;
      font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all .2s; border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #e6b800);
      color: #1a1200;
      box-shadow: 0 4px 16px rgba(245,200,66,.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(245,200,66,.45); }
    .btn-ghost {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

    /* ── Product Columns ── */
    .products-columns {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }
    .products-panel {
      background: rgba(255,255,255,.38);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(10px);
    }
    .products-panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .products-panel-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    .products-panel-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .products-panel-count {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      color: var(--blue);
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(59,145,218,.08);
      border: 1px solid rgba(59,145,218,.18);
    }
    .products-list { display: flex; flex-direction: column; gap: 10px; min-height: 120px; }

    .product-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      transition: all .2s;
    }
    .product-row:hover {
      background: var(--surface2); border-color: rgba(245,200,66,.3);
      transform: translateX(3px);
    }
    .product-row-main {
      display: flex; align-items: center; gap: 14px;
      min-width: 0; flex: 1;
      text-decoration: none; color: var(--text);
    }
    .product-row:hover .pr-arrow { opacity: 1; color: var(--gold); }
    .pr-icon { font-size: 22px; flex-shrink: 0; }
    .pr-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 600;
    }
    .pr-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .pr-meta {
      font-size: 11.5px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pr-arrow {
      margin-left: auto; font-size: 16px;
      opacity: 0; transition: opacity .2s;
      color: var(--muted);
    }
    .product-delete-btn {
      width: 34px; height: 34px; border-radius: 10px;
      border: 1px solid rgba(217,101,118,.35);
      background: rgba(217,101,118,.12);
      color: var(--red);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: all .2s;
    }
    .product-delete-btn:hover {
      background: rgba(217,101,118,.22);
      border-color: rgba(217,101,118,.55);
      transform: translateY(-1px);
    }
    .products-empty {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 88px;
      padding: 16px 18px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px dashed var(--border2);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp .4s ease both; }
    .du-1{animation-delay:.04s} .du-2{animation-delay:.10s} .du-3{animation-delay:.16s} .du-4{animation-delay:.22s}

    @media(max-width:900px)  { .sidebar{display:none} .main{padding:20px} .products-columns{grid-template-columns:1fr} }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="layout">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <div class="logo">
      <a class="logo-back" href="commercial.html" title="Назад">←</a>
      <div>
        <div class="logo-text">Продукты</div>
        <div class="logo-sub">Коммерческий · Клото</div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-label">Каталог</div>
      <a class="nav-item active" href="#">
        <span class="nav-icon">📦</span> Все продукты
        <span class="nav-badge nb-gold">1</span>
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">🧪</span> Стабилизаторы
        <span class="nav-badge nb-gold">1</span>
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">🎨</span> Пигменты
      </a>
      <a class="nav-item" href="#">

      </a>

      <div class="nav-label">Управление</div>
      <a class="nav-item" href="#">

      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">📊</span> Прайс-лист
      </a>

        <span class="nav-icon">📤</span> Экспорт
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="avatar">АК</div>
      <div>
        <div class="user-name">Андрей К.</div>
        <div class="user-role">Руководитель</div>
      </div>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="main">

    <!-- Topbar -->
    <div class="topbar fade-up du-1">
      <div>
        <div class="page-title">📦 Продукты</div>
        <div class="page-sub" id="products-page-sub">Каталог номенклатуры · 0 позиций</div>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <span style="color:var(--muted);font-size:14px">🔍</span>
          <input type="text" placeholder="Найти продукт..." id="search-input" oninput="filterProducts()" />
        </div>
        <button class="btn btn-ghost">📤 Экспорт</button>
        <button class="btn btn-primary" onclick="openNewProductCard()">➕ Новый</button>
      </div>
    </div>

    <div class="products-columns fade-up du-2">
      <section class="products-panel">
        <div class="products-panel-head">
          <div>
            <div class="products-panel-title">Продукты</div>
            <div class="products-panel-sub">Каталог Клото, пользовательские и private label продукты</div>
          </div>
          <div class="products-panel-count" id="all-products-count">0</div>
        </div>
        <div class="products-list" id="all-products-grid"></div>
      </section>

  </main>
</div>


</body>
<script>
  const BUILTIN_PRODUCTS = [
    { id: 'stabilight', key: 'cloto_product_stabilight', name: 'Стабилайт II', sku: 'STB-002', icon: '🧪', cat: 'stabilizer' },
    { id: 'uschr', key: 'cloto_product_uschr', name: 'УЩР (собственный)', sku: 'UShR-001', icon: '🪨', cat: 'stabilizer' },
    { id: 'optitrol', key: 'cloto_product_optitrol', name: 'Оптитрол жидкий', sku: 'OPT-LIQ-001', icon: '🛢️', cat: 'additive' },
    { id: 'blacktrol', key: 'cloto_product_blacktrol', name: 'Блэктрол', sku: 'BLK-001', icon: '🖤', cat: 'pigment' },
    { id: 'maksflex', key: 'cloto_product_maksflex', name: 'Макс-Флекс', sku: 'MF-001', icon: '🟢', cat: 'additive' }
  ];
  const DELETED_PRODUCTS_KEY = 'cloto_products_deleted_v1';
  const CLIENT_STORAGE_KEY = 'cloto_client_cards_v2';
  const KNOWN_KEYS = BUILTIN_PRODUCTS.map(function(product) { return product.key; });

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function readStoredProductData(storageKey) {
    try {
      const raw = localStorage.getItem(storageKey);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      return parsed && typeof parsed === 'object' ? parsed : null;
    } catch (error) {
      return null;
    }
  }
  function sanitizeSkuToken(value, fallback) {
    const cleaned = String(value || '').toUpperCase().replace(/[^A-Z0-9]+/g, '');
    if (cleaned) return cleaned.slice(0, 8);
    return String(fallback || '').toUpperCase().replace(/[^A-Z0-9]+/g, '').slice(0, 8) || 'ITEM';
  }
  function hashKey(value) {
    const text = String(value || '');
    let hash = 0;
    for (let i = 0; i < text.length; i += 1) {
      hash = ((hash << 5) - hash) + text.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash).toString(36).toUpperCase();
  }
  function buildLegacyClientProductSku(companyName, productIdValue) {
    return 'CPL-' + sanitizeSkuToken(hashKey(companyName), 'CL') + '-' + sanitizeSkuToken(productIdValue, 'ITEM');
  }
  function buildClientProductSku(companyName, productIdValue) {
    return 'CPL-' + sanitizeSkuToken(hashKey(companyName), 'CL') + '-' + sanitizeSkuToken(hashKey(productIdValue), 'ITEM');
  }
  function buildCatalogProductSku(productIdValue) {
    return 'PRD-' + sanitizeSkuToken(productIdValue, 'ITEM');
  }

  function normalizeProductName(value) {
    return String(value || '').trim().replace(/\s+/g, ' ').toLowerCase();
  }

  function getCatalogProductAliases(product) {
    const aliases = [product && product.name, product && product.sku];
    const byId = {
      stabilight: ['Stabilight II'],
      uschr: ['УЩР', 'USCHR'],
      optitrol: ['Оптитрол', 'Optitrol', 'Оптитрол Ж', 'Optitrol liquid'],
      blacktrol: ['Blacktrol', 'Блэктрол'],
      maksflex: ['Maksflex', 'Макс-Флекс']
    };
    (byId[String(product && product.id || '')] || []).forEach(function(alias) {
      aliases.push(alias);
    });
    return aliases.map(normalizeProductName).filter(Boolean);
  }

  function readClientStore() {
    try {
      const raw = localStorage.getItem(CLIENT_STORAGE_KEY);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      return parsed && typeof parsed === 'object' ? parsed : {};
    } catch (error) {
      return {};
    }
  }

  function readDeletedProductIds() {
    try {
      const raw = localStorage.getItem(DELETED_PRODUCTS_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed.map(function(id) { return String(id); }) : [];
    } catch (error) {
      return [];
    }
  }

  function writeDeletedProductIds(ids) {
    localStorage.setItem(DELETED_PRODUCTS_KEY, JSON.stringify(ids));
  }

  function collectProducts() {
    const deletedIds = readDeletedProductIds();
    const products = BUILTIN_PRODUCTS.map(function(product) {
      const savedData = readStoredProductData(product.key) || {};
      return {
        id: product.id,
        storageKey: product.key,
        isCustom: false,
        sourceType: 'catalog-builtin',
        name: String(savedData.name || product.name).trim() || product.name,
        sku: String(savedData.sku || product.sku).trim() || product.sku,
        icon: product.icon,
        cat: product.cat,
        meta: String(savedData.sku || product.sku).trim() || product.sku,
        href: 'product-page.html?product=' + encodeURIComponent(product.id)
      };
    }).filter(function(product) {
      return deletedIds.indexOf(product.id) === -1;
    });

    for (let i = 0; i < localStorage.length; i += 1) {
      const key = localStorage.key(i);
      if (!key || key.indexOf('cloto_product_') !== 0) continue;
      if (KNOWN_KEYS.indexOf(key) !== -1) continue;
      const customData = readStoredProductData(key) || {};
      const customName = String(customData.name || '').trim();
      if (!customName) continue;
      const customId = key.replace(/^cloto_product_/, '');
      if (deletedIds.indexOf(customId) !== -1) continue;
      products.push({
        id: customId,
        storageKey: key,
        isCustom: false,
        sourceType: 'catalog-custom',
        name: customName,
        sku: String(customData.sku || buildCatalogProductSku(customId)).trim(),
        icon: '🧩',
        cat: 'additive',
        meta: String(customData.sku || buildCatalogProductSku(customId)).trim() + ' · Пользовательский продукт каталога',
        href: 'product-page.html?product=' + encodeURIComponent(customId)
      });
    }

    const catalogNameLookup = products.reduce(function(map, product) {
      getCatalogProductAliases(product).forEach(function(alias) {
        map[alias] = true;
      });
      return map;
    }, {});

    const clientStore = readClientStore();
    Object.keys(clientStore).forEach(function(companyName) {
      const companyCard = clientStore[companyName];
      const companyProducts = Array.isArray(companyCard && companyCard.products) ? companyCard.products : [];
      companyProducts.forEach(function(product, index) {
        const productId = String(product && product.id || '').trim();
        const productName = String(product && product.name || '').trim();
        const productSkuValue = String(product && product.sku || '').trim();
        const resolvedName = productName || productSkuValue;
        if (!productId || !resolvedName) return;
        if (catalogNameLookup[normalizeProductName(resolvedName)]) return;
        const deletedId = companyName + '::' + productId;
        if (deletedIds.indexOf(deletedId) !== -1) return;
        products.push({
          id: deletedId,
          storageKey: CLIENT_STORAGE_KEY,
          linkedProductId: productId,
          linkedCompany: companyName,
          linkedIndex: index,
          isCustom: true,
          sourceType: 'client-private-label',
          name: resolvedName,
          sku: String((function() {
            const currentSku = String(product.sku || '').trim();
            const legacySku = buildLegacyClientProductSku(companyName, productId);
            if (!currentSku || currentSku === legacySku) return buildClientProductSku(companyName, productId);
            return currentSku;
          })()).trim(),
          icon: '🏷️',
          cat: 'additive',
          meta: String((function() {
            const currentSku = String(product.sku || '').trim();
            const legacySku = buildLegacyClientProductSku(companyName, productId);
            if (!currentSku || currentSku === legacySku) return buildClientProductSku(companyName, productId);
            return currentSku;
          })()).trim() + ' · ' + companyName,
          href: 'client-product.html?company=' + encodeURIComponent(companyName) + '&product=' + encodeURIComponent(productId)
        });
      });
    });

    return products;
  }

  function updateStats(products) {
    document.getElementById('products-page-sub').textContent = 'Каталог номенклатуры · ' + products.length + ' позиций';
    document.getElementById('all-products-count').textContent = String(products.length);
  }

  function deleteProduct(product) {
    const isClientProduct = product && product.sourceType === 'client-private-label';
    const isCustomCatalog = product && product.sourceType === 'catalog-custom';
    const message = isClientProduct
      ? 'Скрыть продукт из списка «Все продукты»?'
      : (isCustomCatalog ? 'Удалить пользовательский продукт из каталога?' : 'Удалить продукт из каталога?');
    if (!window.confirm(message)) return;

    const deletedIds = readDeletedProductIds();

    if (isClientProduct) {
      if (deletedIds.indexOf(product.id) === -1) {
        deletedIds.push(product.id);
        writeDeletedProductIds(deletedIds);
      }
    } else {
      if (deletedIds.indexOf(product.id) === -1) {
        deletedIds.push(product.id);
        writeDeletedProductIds(deletedIds);
      }
      if (product.storageKey) {
        localStorage.removeItem(product.storageKey);
      }
    }

    renderProducts();
  }

  function renderProductList(root, products, emptyText) {
    if (!products.length) {
      root.innerHTML = '<div class="products-empty"><span class="pr-icon">📭</span><span>' + escapeHtml(emptyText) + '</span></div>';
      return;
    }

    root.innerHTML = products.map(function(product) {
      return '<div class="product-row" data-cat="' + product.cat + '">' +
        '<a class="product-row-main" href="' + product.href + '">' +
          '<span class="pr-icon">' + product.icon + '</span>' +
          '<span class="pr-text">' +
            '<span class="pr-name">' + escapeHtml(product.name) + '</span>' +
            (product.meta ? '<span class="pr-meta">' + escapeHtml(product.meta) + '</span>' : '') +
          '</span>' +
          '<span class="pr-arrow">→</span>' +
        '</a>' +
        '<button class="product-delete-btn" type="button" title="Удалить продукт" data-product-id="' + escapeHtml(product.id) + '" data-storage-key="' + escapeHtml(product.storageKey || '') + '" data-is-custom="' + (product.isCustom ? '1' : '0') + '" data-source-type="' + escapeHtml(product.sourceType || '') + '" data-linked-company="' + escapeHtml(product.linkedCompany || '') + '" data-linked-product-id="' + escapeHtml(product.linkedProductId || '') + '">🗑</button>' +
      '</div>';
    }).join('');
  }

  function renderProducts() {
    const query = String(document.getElementById('search-input').value || '').trim().toLowerCase();
    const allProducts = collectProducts();
    const filtered = allProducts.filter(function(product) {
      if (!query) return true;
      const haystack = [product.name, product.meta || ''].join(' ').toLowerCase();
      return haystack.indexOf(query) !== -1;
    });

    renderProductList(document.getElementById('all-products-grid'), filtered, query ? 'По запросу ничего не найдено среди продуктов' : 'Продукты пока не добавлены');

    updateStats(allProducts);
  }

  function filterProducts() {
    renderProducts();
  }

  function openNewProductCard() {
    const newId = 'new_' + Date.now();
    const storageKey = 'cloto_product_' + newId;
    const draft = {
      name: 'Новый продукт',
      sku: buildCatalogProductSku(newId),
      pack: 'bags',
      weight: '',
      pallet: '',
      truckUnits: '',
      contUnits: '',
      price: '',
      priceDate: new Date().toLocaleDateString('ru-RU')
    };
    localStorage.setItem(storageKey, JSON.stringify(draft));
    renderProducts();
    window.location.href = 'product-page.html?product=' + encodeURIComponent(newId);
  }

  function initDeleteActions() {
    const root = document.querySelector('.products-columns');
    root.addEventListener('click', function(event) {
      const deleteButton = event.target.closest('.product-delete-btn');
      if (!deleteButton) return;
      event.preventDefault();
      event.stopPropagation();
      const productId = deleteButton.getAttribute('data-product-id') || '';
      const storageKey = deleteButton.getAttribute('data-storage-key') || '';
      const isCustom = deleteButton.getAttribute('data-is-custom') === '1';
      const sourceType = deleteButton.getAttribute('data-source-type') || '';
      const linkedCompany = deleteButton.getAttribute('data-linked-company') || '';
      const linkedProductId = deleteButton.getAttribute('data-linked-product-id') || '';
      if (!productId) return;
      deleteProduct({
        id: productId,
        storageKey: storageKey,
        isCustom: isCustom,
        sourceType: sourceType,
        linkedCompany: linkedCompany,
        linkedProductId: linkedProductId
      });
    });
  }

  window.filterProducts = filterProducts;
  window.openNewProductCard = openNewProductCard;

  window.addEventListener('storage', function(event) {
    if (!event.key || event.key === CLIENT_STORAGE_KEY || event.key === DELETED_PRODUCTS_KEY || event.key.indexOf('cloto_product_') === 0) {
      renderProducts();
    }
  });

  window.addEventListener('focus', function() {
    renderProducts();
  });

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) renderProducts();
  });

  initDeleteActions();
  renderProducts();
</script>
</html>

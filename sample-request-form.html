<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новая заявка на образцы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080c14;--bg2:#0d1320;--surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);
      --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
      --text:#e8eaf0;--muted:#6b7491;--cyan:#3de8c7;--gold:#f5c842;--green:#48bb78;--red:#ff5e7d;
      --radius:16px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

    .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(61,232,199,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(61,232,199,.03) 1px,transparent 1px);background-size:48px 48px}
    .orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
    .o1{width:560px;height:560px;left:-170px;top:-190px;background:radial-gradient(circle,rgba(61,232,199,.12),transparent 70%)}
    .o2{width:480px;height:480px;right:-140px;bottom:-160px;background:radial-gradient(circle,rgba(124,92,252,.14),transparent 70%)}

    .wrap{position:relative;z-index:1;max-width:1220px;margin:0 auto;padding:28px 22px 34px}
    .top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .title{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:800;line-height:1.15;background:linear-gradient(135deg,#fff 25%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sub{font-size:13px;color:var(--muted);margin-top:4px}

    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);text-decoration:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s}
    .btn:hover{background:var(--surface2);border-color:var(--border2)}
    .btn.main{background:rgba(61,232,199,.14);border-color:rgba(61,232,199,.35);color:var(--cyan)}
    .btn.main:hover{background:rgba(61,232,199,.22);border-color:rgba(61,232,199,.5)}

    .sheet{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid var(--border);border-radius:18px;overflow:hidden;backdrop-filter:blur(12px);box-shadow:0 16px 44px rgba(0,0,0,.45)}
    .sheet-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:16px 18px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(61,232,199,.12),rgba(13,19,32,.9))}
    .sheet-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800}
    .rq-tag{font-size:12px;color:var(--muted);font-weight:700}

    .body{padding:16px;display:flex;flex-direction:column;gap:12px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px}
    .h{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700;margin-bottom:10px}

    .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .f{display:flex;flex-direction:column;gap:6px}
    .lbl{font-size:11px;color:var(--muted);font-weight:600}
    .inp,.ta,.sel{width:100%;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);border-radius:10px;padding:10px 11px;font:inherit;outline:none;transition:all .15s}
    .sel{appearance:none;background-image:linear-gradient(45deg,transparent 50%,#8a93b3 50%),linear-gradient(135deg,#8a93b3 50%,transparent 50%);background-position:calc(100% - 16px) calc(50% - 3px),calc(100% - 11px) calc(50% - 3px);background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:34px}
    .inp:focus,.ta:focus,.sel:focus{border-color:rgba(61,232,199,.45);box-shadow:0 0 0 3px rgba(61,232,199,.1)}
    .ta{resize:vertical;min-height:84px}

    .products-head,.prod-row{display:grid;grid-template-columns:1.2fr .9fr 1.15fr 1.15fr 42px;gap:8px}
    .products-head{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:8px}
    .prod-row{margin-bottom:8px}
    .prod-ta{min-height:44px;resize:vertical}
    .icon-btn{border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);border-radius:10px;cursor:pointer;transition:all .15s;font-size:18px;line-height:1}
    .icon-btn:hover{color:var(--text);border-color:var(--border2);background:rgba(255,255,255,.06)}
    .icon-btn.del:hover{color:var(--red);border-color:rgba(255,94,125,.35)}

    .toast{position:fixed;right:20px;bottom:20px;z-index:30;background:#1b2438;border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:12px;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}

    @media(max-width:980px){.g2,.g3{grid-template-columns:1fr}.products-head{display:none}.prod-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>

  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">Новая заявка на образцы</div>
        <div class="sub">Заполни форму и отправь заявку в лабораторию</div>
      </div>
      <div class="actions">
        <a class="btn" href="sample-requests.html">← К заявкам</a>
        <button class="btn" type="button" onclick="saveDraft()">💾 Сохранить черновик</button>
        <button class="btn main" type="button" onclick="submitRequest()">✅ Отправить заявку</button>
      </div>
    </div>

    <form class="sheet" id="request-form" onsubmit="event.preventDefault();submitRequest();">
      <div class="sheet-head">
        <div class="sheet-title">Заявка на отправку образцов</div>
        <div class="rq-tag">Номер: <span id="rq-num">—</span></div>
      </div>

      <div class="body">
        <div class="card">
          <div class="h">Основные данные</div>
          <div class="g3">
            <label class="f"><span class="lbl">Номер заявки</span><input class="inp" name="requestNumber" id="request-number-input"></label>
            <label class="f"><span class="lbl">Кто разместил</span><input class="inp" name="placedBy" placeholder="ФИО"></label>
            <label class="f"><span class="lbl">Дата размещения</span><input class="inp" name="placedDate" id="placed-date"></label>
          </div>
        </div>

        <div class="card">
          <div class="h">Получатель</div>
          <div class="g2">
            <label class="f"><span class="lbl">Компания получатель</span><input class="inp" name="receiverCompany"></label>
            <label class="f"><span class="lbl">Контактное лицо получателя</span><input class="inp" name="receiverContact"></label>
            <label class="f"><span class="lbl">Email получателя</span><input class="inp" type="email" name="receiverEmail"></label>
            <label class="f"><span class="lbl">Телефон получателя</span><input class="inp" name="receiverPhone"></label>
            <label class="f" style="grid-column:1 / -1"><span class="lbl">Адрес отправки</span><textarea class="ta" name="shippingAddress"></textarea></label>
          </div>
        </div>

        <div class="card">
          <div class="h">Продукты в заявке</div>
          <div class="products-head">
            <div>Наименование продукта</div>
            <div>Количество образца (г/мл)</div>
            <div>Состав образца</div>
            <div>Параметры</div>
            <div></div>
          </div>
          <div id="products-list"></div>
          <datalist id="product-options">
            <option value="ОПТИТРОЛ жидкий"></option>
            <option value="ОПТИТРОЛ порошок"></option>
            <option value="BLACKTROL"></option>
            <option value="MAKSFLEX"></option>
            <option value="STABILIGHT"></option>
            <option value="USCHR"></option>
            <option value="Сульфированный асфальт"></option>
          </datalist>
          <button class="btn" type="button" onclick="addProductRow()">+ Добавить продукт</button>
        </div>

        <div class="card">
          <div class="h">Комментарии</div>
          <label class="f"><span class="lbl">Комментарий к заявке</span><textarea class="ta" name="comments" placeholder="Укажи детали по упаковке, срокам, особым требованиям"></textarea></label>
        </div>
      </div>
    </form>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var PRODUCT_OPTIONS = [
      'ОПТИТРОЛ жидкий',
      'ОПТИТРОЛ порошок',
      'BLACKTROL',
      'MAKSFLEX',
      'STABILIGHT',
      'USCHR',
      'Сульфированный асфальт'
    ];

    function toast(msg){
      var t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); },2200);
    }

    function addProductRow(data){
      data = data || {};
      var row = document.createElement('div');
      row.className = 'prod-row';
      row.innerHTML =
        '<input class="inp" name="productName" list="product-options" placeholder="Начните вводить название продукта" value="'+(data.productName||PRODUCT_OPTIONS[0])+'">' +
        '<input class="inp" name="productQty" placeholder="500 мл" value="'+(data.productQty||'')+'">' +
        '<textarea class="ta prod-ta" name="productComp" placeholder="состав">'+(data.productComp||'')+'</textarea>' +
        '<textarea class="ta prod-ta" name="productParams" placeholder="параметры">'+(data.productParams||'')+'</textarea>' +
        '<button class="icon-btn del" type="button" title="Удалить" onclick="removeProductRow(this)">×</button>';
      document.getElementById('products-list').appendChild(row);
    }

    function removeProductRow(btn){
      var rows = document.querySelectorAll('.prod-row');
      if(rows.length<=1) return;
      btn.parentElement.remove();
    }

    function saveDraft(){
      var form = document.getElementById('request-form');
      var data = {};
      Array.prototype.forEach.call(form.querySelectorAll('[name]'), function(el){
        if (el.name==='productName' || el.name==='productQty' || el.name==='productComp' || el.name==='productParams') return;
        data[el.name] = el.value;
      });
      data.products = [];
      document.querySelectorAll('.prod-row').forEach(function(row){
        data.products.push({
          productName: row.querySelector('[name="productName"]').value,
          productQty: row.querySelector('[name="productQty"]').value,
          productComp: row.querySelector('[name="productComp"]').value,
          productParams: row.querySelector('[name="productParams"]').value
        });
      });
      try{
        localStorage.setItem('cloto_sample_request_form_draft', JSON.stringify(data));
        toast('Черновик сохранен');
      }catch(e){
        toast('Ошибка сохранения');
      }
    }

    function submitRequest(){
      var form = document.getElementById('request-form');
      var request = {
        requestNumber: (form.querySelector('[name="requestNumber"]').value || '').trim(),
        placedBy: (form.querySelector('[name="placedBy"]').value || '').trim(),
        placedDate: (form.querySelector('[name="placedDate"]').value || '').trim(),
        receiverCompany: (form.querySelector('[name="receiverCompany"]').value || '').trim(),
        receiverContact: (form.querySelector('[name="receiverContact"]').value || '').trim(),
        receiverEmail: (form.querySelector('[name="receiverEmail"]').value || '').trim(),
        receiverPhone: (form.querySelector('[name="receiverPhone"]').value || '').trim(),
        shippingAddress: (form.querySelector('[name="shippingAddress"]').value || '').trim(),
        comments: (form.querySelector('[name="comments"]').value || '').trim(),
        status: 'Новая',
        source: 'Коммерческий отдел',
        createdAt: new Date().toISOString(),
        products: []
      };

      document.querySelectorAll('.prod-row').forEach(function(row){
        request.products.push({
          productName: (row.querySelector('[name="productName"]').value || '').trim(),
          productQty: (row.querySelector('[name="productQty"]').value || '').trim(),
          productComp: (row.querySelector('[name="productComp"]').value || '').trim(),
          productParams: (row.querySelector('[name="productParams"]').value || '').trim()
        });
      });

      try {
        var key = 'cloto_incoming_sample_requests';
        var list = [];
        var raw = localStorage.getItem(key);
        if (raw) list = JSON.parse(raw);
        list.unshift(request);
        localStorage.setItem(key, JSON.stringify(list));
        localStorage.removeItem('cloto_sample_request_form_draft');
        toast('Заявка отправлена в лабораторию');
        setTimeout(function(){
          window.location.href = 'incoming-sample-requests.html';
        }, 450);
      } catch(e) {
        toast('Ошибка отправки заявки');
      }
    }

    (function init(){
      var d = new Date();
      var day = String(d.getDate()).padStart(2,'0');
      var month = String(d.getMonth()+1).padStart(2,'0');
      var year = d.getFullYear();
      var dateVal = day + '.' + month + '.' + year;
      document.getElementById('placed-date').value = dateVal;

      var key='cloto_sample_request_number';
      var num=242;
      try{
        var s=parseInt(localStorage.getItem(key),10);
        if(!isNaN(s) && s>0) num=s;
      }catch(e){}
      document.getElementById('rq-num').textContent = 'OBR-' + num;
      document.getElementById('request-number-input').value = 'OBR-' + num;
      try{ localStorage.setItem(key, String(num+1)); }catch(e){}

      var restored = false;
      try{
        var raw = localStorage.getItem('cloto_sample_request_form_draft');
        if(raw){
          var data = JSON.parse(raw);
          Object.keys(data).forEach(function(name){
            if(name==='products') return;
            var el = document.querySelector('[name="'+name+'"]');
            if(el) el.value = data[name];
          });
          if(Array.isArray(data.products) && data.products.length){
            data.products.forEach(function(p){ addProductRow(p); });
            restored = true;
          }
        }
      }catch(e){}
      if(!restored){
        addProductRow({ productName: 'ОПТИТРОЛ жидкий', productQty: '500 мл' });
      }
    })();
  </script>
</body>
</html>
